{% extends "base.html" %}
{% block title %}Football Vault Admin{% endblock %}
{% block content %}
<h2 class="mb-4">Dashboard</h2>
<div class="row g-3">
  {% for table, count in table_counts.items() %}
  <div class="col-md-4 col-lg-3">
    <a href="{{ url_for('table_list', table_name=table) }}" class="text-decoration-none">
      <div class="card h-100">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="card-title mb-0">{{ table }}</h5>
          </div>
          <span class="badge bg-primary fs-6">{{ count }}</span>
        </div>
      </div>
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
