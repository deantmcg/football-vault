<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Football Vault Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; }
    .navbar { background: #16213e !important; }
    .card { background: #16213e; border-color: #0f3460; }
    .table { --bs-table-bg: #16213e; --bs-table-border-color: #0f3460; }
    .table-hover > tbody > tr:hover { --bs-table-hover-bg: #0f3460; }
    .btn-primary { background: #0f3460; border-color: #0f3460; }
    .btn-primary:hover { background: #533483; border-color: #533483; }
    .colour-swatch {
      display: inline-block; width: 20px; height: 20px;
      border: 1px solid #555; border-radius: 3px; vertical-align: middle;
    }
    .table td, .table th { vertical-align: middle; white-space: nowrap; }
    .table td.wrap { white-space: normal; max-width: 250px; }
    .fk-badge { font-size: 0.8em; }
    .cell-display { display: block; min-height: 1.4em; cursor: default; }
    .table-responsive { max-height: 80vh; overflow: auto; }
    .table thead th { position: sticky; top: 0; z-index: 3; background: #16213e; }
    .table .col-actions { position: sticky; right: 0; z-index: 1; background: #16213e; }
    .table thead .col-actions { z-index: 4; }
    .table-hover > tbody > tr:hover .col-actions { background: #0f3460; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">&#9917; Football Vault</a>
    </div>
  </nav>
  <div class="container-fluid px-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
